[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentos-gateway"
version = "0.1.0"
description = "Agent OS Gateway — FastAPI backend for agent orchestration"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "aiosqlite>=0.20.0",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.4.0",
  "httpx>=0.27.0",
  "gitpython>=3.1.40",
  "keyring>=25.0.0",
  "pywin32>=306; sys_platform == 'win32'",
  "pyyaml>=6.0.1",
  "anthropic>=0.34.0",
  "ulid-py>=1.1.0",
  "tiktoken>=0.7.0",
  "rich>=13.7.0",
  "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
  "httpx>=0.27.0",
  "mypy>=1.11.0",
  "ruff>=0.6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agentos_gateway"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
